<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Generator</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="fade-in">

<div class="container py-5" style="max-width: 900px;">

    <!-- Header -->
    <div class="text-center mb-4">
        <h1 class="main-title">AI Code Generator</h1>
        <p class="subtitle">Generate clean production-ready code</p>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Form -->
    <div class="card custom-card">
        <div class="card-body p-4">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Enter Your Prompt</label>
                    <textarea name="prompt" rows="5" class="form-control custom-input"
                        placeholder="Example: Build a Python calculator" required></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Select Language</label>
                    <select name="language" class="form-select custom-input">
                        <option>Python</option>
                        <option>Java</option>
                        <option>C</option>
                        <option>C++</option>
                        <option>JavaScript</option>
                    </select>
                </div>

                <button type="submit" class="btn generate-btn w-100">
                    Generate Code
                </button>

            </form>

        </div>
    </div>

    <!-- Output -->
    {% if generated_code %}
    <div class="card output-card mt-4">

        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">💻 Generated Code</h5>

            <button class="btn btn-primary btn-sm" onclick="copyCode()">
                📋 Copy
            </button>
        </div>

        <div class="card-body">

            <pre class="code-block">
<code id="generatedCode" class="language-python">{{ generated_code | e }}</code>
            </pre>

        </div>
    </div>
    {% endif %}

    <!-- History -->
    {% if history %}
    <div class="card history-card mt-4">

        <div class="card-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0">🕒 History</h5>
            <a href="/clear" class="btn btn-danger btn-sm">Clear</a>
        </div>

        <div class="card-body">

            {% for item in history %}
            <div class="history-item">

                <h6 class="lang-text">{{ item.language }}</h6>
                <p class="mb-1 prompt-text">{{ item.prompt }}</p>
                <small class="text-muted">{{ item.created_at }}</small>

                <div class="mt-2">
                    <a href="/delete/{{ item.id }}" class="btn btn-danger btn-sm">Delete</a>
                </div>

            </div>
            {% endfor %}

        </div>

    </div>
    {% endif %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
